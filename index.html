<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration & Service Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Company Registration & Service Request Form</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Personal Information</legend>
            
            <label biographies for="full-name">Full Name *</label>
            <input type="text" id="full-name" name="fullName" required minlength="3" maxlength="50" placeholder="John Doe">

            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="example@domain.com">

            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" required pattern="[0-9]{9,12}" placeholder="e.g. 0712345678">

            <label for="address">Address *</label>
            <input type="text" id="address" name="address" required placeholder="123 Business Lane">
        </fieldset>

        <fieldset>
            <legend>Company Information</legend>

            <label for="company-name">Company Name *</label>
            <input type="text" id="company-name" name="companyName" required>

            <label for="company-website">Company Website</label>
            <input type="url" id="company-website" name="companyWebsite" placeholder="https://example.com">

            <label for="company-size">Company Size *</label>
            <select id="company-size" name="companySize" required>
                <option value="" disabled selected>Select company size...</option>
                <option value="1-10">1 - 10 Employees</option>
                <option value="11-50">11 - 50 Employees</option>
                <option value="51-200">51 - 200 Employees</option>
                <option value="201+">201+ Employees</option>
            </select>

            <label for="industry">Industry *</label>
            <input type="text" id="industry" name="industry" required placeholder="e.g., Tech, Finance, Healthcare">
        </fieldset>

        <fieldset>
            <legend>Service Request</legend>

            <label>Service Type *</label>
            <div class="radio-group">
                <input type="radio" id="service-consulting" name="serviceType" value="consulting" required>
                <label for="service-consulting" class="inline-label">Consulting</label>
                
                <input type="radio" id="service-development" name="serviceType" value="development">
                <label for="service-development" class="inline-label">Development</label>
                
                <input type="radio" id="service-design" name="serviceType" value="design">
                <label for="service-design" class="inline-label">UI/UX Design</label>
            </div>

            <label>Preferred Contact Method</label>
            <div class="checkbox-group">
                <input type="checkbox" id="contact-email" name="contactMethod" value="email">
                <label for="contact-email" class="inline-label">Email</label>

                <input type="checkbox" id="contact-phone" name="contactMethod" value="phone">
                <label for="contact-phone" class="inline-label">Phone Call</label>
            </div>

            <label for="appointment-date">Appointment Date *</label>
            <input type="date" id="appointment-date" name="appointmentDate" required>

            <label for="appointment-time">Appointment Time *</label>
            <input type="time" id="appointment-time" name="appointmentTime" required>

            <label for="budget">Budget Range (USD) *</label>
            <input type="range" id="budget" name="budget" min="1000" max="50000" step="1000" value="5000">
            <span class="gray">Slide to choose between $1,000 and $50,000</span>
        </fieldset>

        <fieldset>
            <legend>Message and Agreement</legend>

            <label for="additional-info">Additional Information / Message</label>
            <textarea id="additional-info" name="additionalInfo" rows="4" maxlength="500" placeholder="Tell us more about your request..."></textarea>

            <div class="terms-container">
                <input type="checkbox" id="terms" name="termsAgreement" required>
                <label for="terms" class="inline-label">I accept the Terms and Conditions *</label>
            </div>
        </fieldset>

        <div class="form-actions">
            <input type="submit" value="Submit Request">
            <input type="reset" value="Reset Form">
        </div>

    </form>

</body>
  </html>
